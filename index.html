<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCloseTradeIdeas</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --green: #00a36c; --red: #ff3b30; --blue: #007aff; --border: #eeeeee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; padding: 20px; max-width: 500px; margin: auto; }
        h1 { font-family: 'Syne', sans-serif; font-size: 28px; margin-bottom: 5px; }
        .tagline { color: #666; font-size: 13px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; line-height: 1.4; }
        .stats { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-box { flex: 1; border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #f9f9f9; }
        .label { font-size: 10px; text-transform: uppercase; color: #888; font-weight: bold; }
        .val { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .sym { font-weight: bold; font-size: 16px; }
        .prc { color: #666; font-size: 14px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pos-info { font-size: 11px; margin-bottom: 10px; color: var(--blue); font-weight: bold; }
        button { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Space Mono'; font-size: 11px; }
        .buy-btn { background: var(--green); color: white; }
        .short-btn { background: var(--red); color: white; }
        .close-btn { background: var(--text); color: white; width: 100%; margin-top: 8px; }
        button:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

    <h1>OpenCloseTradeIdeas</h1>
    <p class="tagline">Momentum stocks open and close suggestions including shorts and covering</p>

    <div class="stats">
        <div class="stat-box"><div class="label">Equity</div><div id="equity" class="val">$10,000.00</div></div>
        <div class="stat-box"><div class="label">Cash</div><div id="cash" class="val">$10,000.00</div></div>
    </div>

    <div id="market-list"></div>

    <script>
        let cash = 10000;
        let portfolio = {}; // Positive = Long, Negative = Short
        const stocks = { "NVDA": 892.10, "AAPL": 175.45, "BTC": 68240.00, "TSLA": 171.20, "AMD": 180.50 };

        function updateUI() {
            let totalVal = cash;
            for(let s in portfolio) totalVal += (portfolio[s] * stocks[s]);
            
            document.getElementById('cash').innerText = '$' + cash.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('equity').innerText = '$' + totalVal.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            let html = '';
            for(let s in stocks) {
                const pos = portfolio[s] || 0;
                const posText = pos > 0 ? `LONG: ${pos}` : pos < 0 ? `SHORT: ${Math.abs(pos)}` : '';
                
                html += `
                <div class="card">
                    <div class="stock-header">
                        <span class="sym">${s}</span>
                        <span class="prc">$${stocks[s].toFixed(2)}</span>
                    </div>
                    ${pos !== 0 ? `<div class="pos-info">${posText}</div>` : ''}
                    <div class="actions">
                        <button class="buy-btn" onclick="trade('${s}', 1)">OPEN LONG</button>
                        <button class="short-btn" onclick="trade('${s}', -1)">OPEN SHORT</button>
                    </div>
                    ${pos !== 0 ? `<button class="close-btn" onclick="closePos('${s}')">CLOSE POSITION</button>` : ''}
                </div>`;
            }
            document.getElementById('market-list').innerHTML = html;
        }

        function trade(s, dir) {
            const cost = stocks[s];
            if (dir === 1 && cash < cost) return alert("No cash!");
            // When shorting (dir -1), cash actually increases initially
            cash -= (cost * dir);
            portfolio[s] = (portfolio[s] || 0) + dir;
            updateUI();
        }

        function closePos(s) {
            const pos = portfolio[s];
            cash += (pos * stocks[s]);
            portfolio[s] = 0;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
