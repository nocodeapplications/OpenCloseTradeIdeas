<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCloseTradeIdeas</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --green: #00a36c; --red: #ff3b30; --border: #eeeeee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; padding: 20px; max-width: 500px; margin: auto; }
        h1 { font-family: 'Syne', sans-serif; font-size: 28px; margin-bottom: 5px; }
        .tagline { color: #666; font-size: 13px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; line-height: 1.4; }
        .stats { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-box { flex: 1; border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #f9f9f9; }
        .label { font-size: 10px; text-transform: uppercase; color: #888; font-weight: bold; }
        .val { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .card:hover { border-color: #ccc; }
        .stock-info { display: flex; flex-direction: column; }
        .sym { font-weight: bold; font-size: 16px; }
        .prc { color: #666; font-size: 14px; margin-top: 2px; }
        .actions { display: flex; gap: 8px; }
        button { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Space Mono'; font-size: 12px; transition: 0.2s; }
        .buy-btn { background: var(--green); color: white; }
        .sell-btn { background: var(--red); color: white; }
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <h1>OpenCloseTradeIdeas</h1>
    <p class="tagline">Momentum stocks open and close suggestions including shorts and covering</p>

    <div class="stats">
        <div class="stat-box"><div class="label">Equity</div><div id="equity" class="val">$10,000.00</div></div>
        <div class="stat-box"><div class="label">Cash</div><div id="cash" class="val">$10,000.00</div></div>
    </div>

    <div id="market-list"></div>

    <script>
        let cash = 10000;
        let portfolio = {};
        const stocks = { "NVDA": 892.10, "AAPL": 175.45, "BTC": 68240.00, "TSLA": 171.20, "AMD": 180.50 };

        function updateUI() {
            document.getElementById('cash').innerText = '$' + cash.toLocaleString(undefined, {minimumFractionDigits: 2});
            let totalVal = cash;
            for(let s in portfolio) totalVal += (portfolio[s] * stocks[s]);
            document.getElementById('equity').innerText = '$' + totalVal.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            let html = '';
            for(let s in stocks) {
                const hasPosition = portfolio[s] > 0;
                html += `
                <div class="card">
                    <div class="stock-info">
                        <span class="sym">${s}</span>
                        <span class="prc">$${stocks[s].toFixed(2)}</span>
                    </div>
                    <div class="actions">
                        ${hasPosition ? `<button class="sell-btn" onclick="sell('${s}')">CLOSE</button>` : ''}
                        <button class="buy-btn" onclick="buy('${s}')">OPEN</button>
                    </div>
                </div>`;
            }
            document.getElementById('market-list').innerHTML = html;
        }

        function buy(s) {
            if(cash < stocks[s]) return alert("Insufficient Buying Power!");
            cash -= stocks[s];
            portfolio[s] = (portfolio[s] || 0) + 1;
            updateUI();
        }

        function sell(s) {
            if(!portfolio[s] || portfolio[s] <= 0) return;
            cash += stocks[s];
            portfolio[s] -= 1;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
